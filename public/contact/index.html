    <script>
      (function () {
        function injectScript(src) {
          var s = document.createElement("script");
          s.type = "module";
          s.src = src;
          document.body.appendChild(s);
        }
        function injectStyle(href) {
          var l = document.createElement("link");
          l.rel = "stylesheet";
          l.href = href;
          document.head.appendChild(l);
        }
        function showFallbackMessage() {
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML =
            '<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Inter,Arial,sans-serif;text-align:center;color:#1f2937;">' +

            "<p style=\"margin:0 0 1rem;\">The page is having trouble loading right now.</p>" +
            '<p style="margin:0;"><a href="/" style="color:#7c5c41;text-decoration:underline;">Go to home</a></p></div></div>';
        }
        fetch("/index.html", { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error("Failed to load app shell");
            return r.text();
          })
          .then(function (html) {
            var styleRe = /<link[^>]+rel=["']stylesheet["'][^>]+href=["']([^"']+)["'][^>]*>/gi,
              sm;
            while ((sm = styleRe.exec(html)) !== null) {
              injectStyle(sm[1]);
            }
            var m = html.match(/<script[^>]+type=\"module\"[^>]+src=\"([^\"]+)\"/i);
            if (!m) throw new Error("Missing app entry script");
            injectScript(m[1]);
          })
          .catch(function () {
            showFallbackMessage();
          });
      })();
    </script>
