  <body>
    <div id="root"></div>
    
    <script>
      (function() {
        function injectScript(src) {
          var s = document.createElement('script');
          s.type = 'module';
          s.src = src;
          document.body.appendChild(s);
        }
        function injectStyle(href) {
          var l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = href;
          document.head.appendChild(l);
        }
        fetch('/index.html', { cache: 'no-store' })
          .then(function(r){ return r.text(); })
          .then(function(html){
            var styleRe = /<link[^>]+rel=["']stylesheet["'][^>]+href=["']([^"']+)["'][^>]*>/ig, sm;
            while ((sm = styleRe.exec(html)) !== null) {
              injectStyle(sm[1]);
            }
            var m = html.match(/<script[^>]+type=\"module\"[^>]+src=\"([^\"]+)\"/i);
            injectScript(m ? m[1] : '/src/main.tsx');
          })
          .catch(function(){ injectScript('/src/main.tsx'); });
      })();
    </script>
  </body>
